<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#0D0D0D"/>
<title>Ef Calculator — Financial Health for Freelancers</title>
<meta name="description" content="A quick financial health calculator for video editors and freelancers. Get your score, stage, and personalized recommendations."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0A0A0A;
  --bg-card:#161616;
  --bg-card2:#1F1F1F;
  --bg-input:#0F0F0F;
  --border:#262626;
  --accent:#F97316;
  --accent2:#FB923C;
  --accent-dim:rgba(249,115,22,.15);
  --amber:#F59E0B;
  --amber-dim:rgba(245,158,11,.12);
  --green:#22C55E;
  --green-dim:rgba(34,197,94,.12);
  --red:#EF4444;
  --red-dim:rgba(239,68,68,.12);
  --blue:#3B82F6;
  --purple:#A855F7;
  --pink:#EC4899;
  --muted:#6B7280;
  --text:#F9FAFB;
  --text2:#9CA3AF;
  --text3:#4B5563;
  --r-sm:8px;--r-md:14px;--r-lg:20px;--r-xl:28px;
  --gap:16px;--gap-sm:10px;
  --font:'Inter',system-ui,sans-serif;
  --trans:.2s ease;
}
html,body{height:100%;background:radial-gradient(ellipse at top,var(--bg-tint,#1a0e05) 0%,var(--bg) 50%);color:var(--text);font-family:var(--font);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;overscroll-behavior-y:contain}
#main[data-theme="income"]{--accent:#22C55E;--accent2:#4ADE80;--accent-dim:rgba(34,197,94,.18);--amber:#16A34A;--bg-tint:#0a1f12}
#main[data-theme="expense"]{--accent:#EF4444;--accent2:#F87171;--accent-dim:rgba(239,68,68,.18);--amber:#DC2626;--bg-tint:#1f0a0a}
#main[data-theme="income"] ~ #header,#main[data-theme="expense"] ~ #header{}
body:has(#main[data-theme="income"]){--bg-tint:#0a1f12}
body:has(#main[data-theme="expense"]){--bg-tint:#1f0a0a}
button{font-family:var(--font)}

#app{display:flex;flex-direction:column;min-height:100dvh;max-width:560px;margin:0 auto;position:relative}

/* HEADER */
#header{position:sticky;top:0;z-index:50;background:rgba(10,10,10,.92);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:14px var(--gap) 12px}
.brand{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.brand-name{font-size:18px;font-weight:800;letter-spacing:-.02em}
.brand-name span{color:var(--accent)}
.brand-step{font-size:11px;color:var(--text2);font-weight:500;text-transform:uppercase;letter-spacing:.08em}
.progress-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;position:relative}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--amber));border-radius:2px;transition:width .5s cubic-bezier(.4,0,.2,1);box-shadow:0 0 8px var(--accent-dim)}

/* CONTAINER */
#main{flex:1;padding:18px var(--gap) 100px;overflow-x:hidden}

/* STEP HEADER */
.step-h{margin-bottom:16px}
.step-num{display:inline-block;background:var(--accent-dim);color:var(--accent);font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;letter-spacing:.06em;text-transform:uppercase}
.step-title{font-size:24px;font-weight:800;line-height:1.15;margin-top:8px;letter-spacing:-.02em}
.step-sub{font-size:13px;color:var(--text2);margin-top:6px;line-height:1.45}

/* CARDS */
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-md);padding:var(--gap);margin-bottom:var(--gap-sm)}
.glow{box-shadow:0 0 40px var(--accent-dim);border-color:var(--accent)}

/* NUM CONTROL (slider + number) */
.num-ctrl{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-md);padding:12px 14px;margin-bottom:8px;transition:border-color var(--trans)}
.num-ctrl:focus-within{border-color:var(--accent)}
.num-top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px}
.num-lbl{font-size:13px;font-weight:500;color:var(--text2);flex:1;min-width:0}
.num-display{background:var(--bg-input);border:1.5px solid var(--border);border-radius:var(--r-sm);color:var(--accent);font-family:var(--font);font-size:15px;font-weight:700;padding:6px 10px;width:110px;text-align:right;outline:none;transition:all var(--trans);-moz-appearance:textfield;caret-color:var(--accent)}
.num-display::-webkit-outer-spin-button,.num-display::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.num-display:focus{border-color:var(--accent);background:var(--accent-dim)}
.num-display[readonly]{background:transparent;border-color:transparent;cursor:pointer;user-select:none;-webkit-user-select:none;pointer-events:auto}
.num-display[readonly]:active{background:var(--accent-dim);border-color:var(--accent)}
.num-prefix{font-size:13px;color:var(--text2);margin-right:-6px}
.num-row{display:flex;align-items:center;gap:8px}
.range-wrap{position:relative;height:24px;display:flex;align-items:center}
input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:6px;border-radius:3px;background:linear-gradient(90deg,var(--accent) 0%,var(--accent) var(--p,0%),var(--border) var(--p,0%));outline:none;cursor:pointer;touch-action:pan-y}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:#fff;cursor:pointer;box-shadow:0 0 0 4px var(--accent),0 0 14px var(--accent-dim);border:none}
input[type=range]::-moz-range-thumb{width:22px;height:22px;border-radius:50%;background:#fff;cursor:pointer;box-shadow:0 0 0 4px var(--accent);border:none}
.range-marks{display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-top:6px;font-weight:500}

/* OPTION CARDS */
.opt-grid{display:grid;gap:10px;margin-bottom:14px}
.opt{background:var(--bg-card);border:2px solid var(--border);border-radius:var(--r-md);padding:14px;cursor:pointer;transition:all var(--trans);position:relative}
.opt:hover{border-color:var(--accent);transform:translateY(-1px)}
.opt.sel{border-color:var(--accent);background:var(--accent-dim)}
.opt.sel::after{content:'✓';position:absolute;top:14px;right:14px;width:22px;height:22px;background:var(--accent);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}
.opt-title{font-size:14px;font-weight:600}
.opt-sub{font-size:12px;color:var(--text2);margin-top:3px}

/* INPUT (text/email/phone) */
.field{margin-bottom:14px}
.field-lbl{display:block;font-size:11px;font-weight:600;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em}
.input{background:var(--bg-input);border:1.5px solid var(--border);border-radius:var(--r-sm);color:var(--text);font-family:var(--font);font-size:15px;padding:12px 14px;width:100%;outline:none;transition:all var(--trans)}
.input:focus{border-color:var(--accent);background:var(--accent-dim)}
.input-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.phone-row{display:flex;gap:8px}
.phone-row .input.cc{width:80px;flex-shrink:0}

/* CUSTOM EXPENSE ROWS */
.custom-row{display:flex;gap:8px;margin-bottom:8px;align-items:stretch}
.custom-row .input{flex:1}
.custom-row .input.amt{max-width:120px}
.del-btn{background:var(--red-dim);border:none;color:var(--red);width:42px;border-radius:var(--r-sm);cursor:pointer;font-size:18px;transition:all var(--trans)}
.del-btn:hover{background:var(--red);color:#fff}
.add-btn{background:var(--accent-dim);border:1.5px dashed var(--accent);color:var(--accent);font-weight:600;font-size:14px;padding:12px;border-radius:var(--r-md);width:100%;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all var(--trans)}
.add-btn:hover{background:var(--accent);color:#fff;border-style:solid}

/* CHIPS */
.chip-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px}
.chip{padding:8px 14px;border-radius:20px;border:1.5px solid var(--border);font-size:13px;font-weight:500;cursor:pointer;color:var(--text2);transition:all var(--trans);background:var(--bg-card)}
.chip.sel{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:14px 22px;border-radius:var(--r-md);border:none;font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;transition:all var(--trans);text-decoration:none}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 4px 16px var(--accent-dim)}
.btn-primary:hover{background:#ea6a0a;transform:translateY(-1px)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-secondary{background:var(--bg-card2);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent)}
.btn-ghost{background:transparent;color:var(--text2)}
.btn-full{width:100%}
.btn-lg{padding:16px 26px;font-size:15px}

/* BOTTOM NAV (Back / Continue) */
#step-nav{position:fixed;left:0;right:0;bottom:0;padding:14px var(--gap);background:linear-gradient(to top,var(--bg) 60%,transparent);display:flex;gap:10px;justify-content:center;z-index:40}
#step-nav>div{display:flex;gap:10px;max-width:560px;width:100%}

/* TOAST */
#toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(30px);background:var(--bg-card2);color:var(--text);padding:12px 22px;border-radius:30px;font-size:13px;font-weight:500;border:1px solid var(--border);opacity:0;pointer-events:none;transition:all .3s ease;z-index:300;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.4)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* WELCOME / SIGN IN */
.welcome-hero{text-align:center;padding:18px 0 14px}
.welcome-emoji{font-size:56px;margin-bottom:12px;filter:drop-shadow(0 4px 20px var(--accent-dim))}
.welcome-title{font-size:28px;font-weight:900;line-height:1.1;letter-spacing:-.03em;margin-bottom:10px}
.welcome-title span{background:linear-gradient(90deg,var(--accent),var(--amber));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.welcome-sub{font-size:14px;color:var(--text2);margin-bottom:16px;padding:0 6px}
.feat-list{text-align:left;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-md);padding:12px 14px;margin-bottom:16px}
.feat-item{display:flex;gap:12px;padding:6px 0;align-items:center}
.feat-ico{width:32px;height:32px;border-radius:50%;background:var(--accent-dim);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px}
.feat-txt{font-size:13px;color:var(--text2)}
.feat-txt strong{color:var(--text);font-weight:600}
#signin-hero{
  background:linear-gradient(135deg,#1a1209 0%,#1f1208 100%);
  border:2px solid var(--accent);
  border-radius:var(--r-lg);
  padding:22px 18px 18px;
  margin-bottom:18px;
  text-align:center;
  box-shadow:0 8px 32px rgba(249,115,22,.22), inset 0 1px 0 rgba(255,255,255,.04);
  position:relative;
  overflow:hidden;
}
#signin-hero::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle,rgba(249,115,22,.15) 0%,transparent 60%);pointer-events:none;animation:slowPulse 4s ease-in-out infinite}
@keyframes slowPulse{0%,100%{opacity:.6}50%{opacity:1}}
.signin-hero-h{font-size:18px;font-weight:800;letter-spacing:-.02em;margin-bottom:4px;position:relative;z-index:1}
.signin-hero-sub{font-size:12px;color:var(--text2);margin-bottom:14px;position:relative;z-index:1}
#g-signin-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:48px;position:relative;z-index:1}
#g-signin-wrap>div{display:flex;justify-content:center;width:100%}
#g_id_onload{display:none!important}
.g_id_signin{transform:scale(1.05);transform-origin:center;filter:drop-shadow(0 4px 14px rgba(249,115,22,.4))}
.signin-note{font-size:11px;color:var(--text3);text-align:center;margin-top:12px;padding:0 16px;position:relative;z-index:1}

/* RESULT SCREEN */
.score-hero{background:linear-gradient(135deg,#1a1209 0%,#1a0d05 100%);border:1px solid var(--accent);border-radius:var(--r-xl);padding:28px 22px;text-align:center;margin-bottom:var(--gap);position:relative;overflow:hidden}
.score-hero::before{content:'';position:absolute;top:-60px;right:-60px;width:180px;height:180px;background:var(--accent-dim);border-radius:50%;filter:blur(50px)}
.score-hero::after{content:'';position:absolute;bottom:-80px;left:-40px;width:160px;height:160px;background:rgba(245,158,11,.12);border-radius:50%;filter:blur(60px)}
.score-ring-wrap{position:relative;width:170px;height:170px;margin:0 auto 16px;z-index:2}
.score-ring{transform:rotate(-90deg)}
.score-ring-bg{fill:none;stroke:var(--border);stroke-width:10}
.score-ring-fg{fill:none;stroke:url(#gradOrange);stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset 1s cubic-bezier(.4,0,.2,1)}
.score-num{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:3}
.score-num-big{font-size:48px;font-weight:900;line-height:1;letter-spacing:-.04em}
.score-num-of{font-size:13px;color:var(--text2);margin-top:2px}
.score-stage-lbl{font-size:20px;font-weight:800;margin-bottom:6px;z-index:2;position:relative}
.score-stage-sub{font-size:13px;color:var(--text2);z-index:2;position:relative}

.bench-card{background:var(--bg-card);border:1px solid var(--accent);border-radius:var(--r-md);padding:16px;margin-bottom:var(--gap);text-align:center}
.bench-pct{font-size:26px;font-weight:900;color:var(--accent);letter-spacing:-.02em}
.bench-txt{font-size:13px;color:var(--text2);margin-top:6px;line-height:1.5}
.bench-num{font-weight:700;color:var(--text)}

.tbl-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:var(--gap)}
.tbl{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-md);padding:14px}
.tbl-title{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.tbl-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:13px}
.tbl-row .l{color:var(--text2)}
.tbl-row .v{font-weight:700}
.tbl-row.profit .v{color:var(--green)}
.tbl-row.expense .v{color:var(--red)}

.score-breakdown{margin-bottom:var(--gap)}
.score-breakdown .card{padding:var(--gap)}
.bd-row{margin-bottom:10px}
.bd-row:last-child{margin-bottom:0}
.bd-top{display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px}
.bd-lbl{color:var(--text2);font-weight:500}
.bd-val{font-weight:700}
.bd-track{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.bd-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent),var(--amber));transition:width .5s ease}

.chart-wrap{position:relative;height:240px;margin-top:10px}

.rec-card{display:flex;gap:12px;align-items:flex-start;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-md);padding:14px;margin-bottom:10px}
.rec-ico{font-size:22px;flex-shrink:0;margin-top:1px}
.rec-text{font-size:13px;color:var(--text2);line-height:1.5}
.rec-text strong{color:var(--text);font-weight:600}

.section-title{font-size:12px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;margin:18px 0 8px;padding-left:2px}

.action-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:30px}
.action-grid .btn-full{grid-column:1/-1}

/* PROJECTION */
.proj-card{background:linear-gradient(135deg,#1a1209 0%,#0d1a18 100%);border:1px solid var(--accent);border-radius:var(--r-md);padding:var(--gap);margin-bottom:var(--gap)}
.proj-years{font-size:32px;font-weight:900;color:var(--accent);letter-spacing:-.02em;line-height:1}
.proj-years-sub{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;margin-top:2px}
.proj-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
.proj-stat{background:rgba(0,0,0,.3);border-radius:var(--r-sm);padding:10px 12px}
.proj-stat-lbl{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.proj-stat-val{font-size:18px;font-weight:800;letter-spacing:-.02em}
.proj-stat-val.wealth{color:var(--accent)}
.proj-stat-val.income{color:var(--green)}
.proj-stat-val.exp{color:var(--red)}

/* FINAL REPORT */
.fr-verdict{background:var(--bg-card);border:1px solid var(--accent);border-radius:var(--r-md);padding:14px 16px;margin-bottom:var(--gap);font-size:14px;font-weight:600;line-height:1.5}
.fr-grid{display:grid;grid-template-columns:1fr;gap:10px;margin-bottom:var(--gap)}
.fr-block{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-md);padding:14px}
.fr-block-h{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.fr-block.pos .fr-block-h{color:var(--green)}
.fr-block.neg .fr-block-h{color:var(--red)}
.fr-block.foc .fr-block-h{color:var(--accent)}
.fr-block ul{list-style:none;padding:0;margin:0}
.fr-block li{font-size:13px;color:var(--text);line-height:1.5;padding:5px 0 5px 18px;position:relative}
.fr-block li::before{content:'';position:absolute;left:0;top:11px;width:6px;height:6px;border-radius:50%}
.fr-block.pos li::before{background:var(--green)}
.fr-block.neg li::before{background:var(--red)}
.fr-block.foc li::before{background:var(--accent)}

/* AUTO-SAVE STATUS */
.save-status{display:flex;align-items:center;justify-content:center;gap:8px;font-size:12px;color:var(--text2);padding:8px;margin-bottom:var(--gap)}
.save-status.ok{color:var(--green)}
.save-status.err{color:var(--red)}
.save-status .dot{width:8px;height:8px;border-radius:50%;background:currentColor;animation:pulse 1.5s ease-in-out infinite}
.save-status.ok .dot,.save-status.err .dot{animation:none}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}

.stage-tag{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700}
.stg-Elite{background:rgba(168,85,247,.15);color:var(--purple)}
.stg-Thriving{background:rgba(34,197,94,.12);color:var(--green)}
.stg-Growing{background:rgba(249,115,22,.15);color:var(--accent)}
.stg-Stable{background:rgba(59,130,246,.12);color:var(--blue)}
.stg-AtRisk{background:rgba(245,158,11,.12);color:var(--amber)}
.stg-Critical{background:rgba(239,68,68,.12);color:var(--red)}

/* PROFILE BADGE */
.user-badge{display:flex;align-items:center;gap:10px;background:var(--bg-card);border:1px solid var(--border);border-radius:30px;padding:6px 14px 6px 6px}
.user-badge img{width:28px;height:28px;border-radius:50%}
.user-badge-name{font-size:12px;font-weight:600}

/* PRINT */
@media print{
  body{background:#fff;color:#111}
  #header,#step-nav,#toast,.action-grid,button{display:none!important}
  #app{max-width:none}
  #main{padding:0}
  .card,.tbl,.bench-card,.rec-card{break-inside:avoid;background:#f9f9f9;border:1px solid #ddd;color:#111}
  .score-hero{background:#fff8f1;border:2px solid var(--accent);color:#111}
  .num-display,.score-num-big,.bd-val,.tbl-row .v,.bench-pct{color:#111!important}
  .num-display{background:#fff;border:1px solid #ccc}
  .step-title,.score-stage-lbl,.bd-lbl,.tbl-row .l,.welcome-title{color:#111!important}
  .step-sub,.rec-text,.tbl-title,.bench-txt,.score-num-of{color:#444!important}
}

/* MOBILE TWEAKS */
@media(max-width:380px){
  .welcome-title{font-size:26px}
  .step-title{font-size:22px}
  .num-display{width:100px;font-size:14px}
  .tbl-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div id="app">

const FREELANCER_POP_IN = 15_000_000; // ~15M freelancers in India (NASSCOM 2024 est)
const WORLD_POP = 8_100_000_000;
const PERCENTILE_MAP = [
  {s:0,p:0},{s:25,p:12},{s:40,p:30},{s:55,p:55},{s:70,p:78},{s:85,p:94},{s:100,p:99.5}
];
function scoreToPercentile(score){
  score = Math.max(0,Math.min(100,score));
  for(let i=0;i<PERCENTILE_MAP.length-1;i++){
    const a=PERCENTILE_MAP[i], b=PERCENTILE_MAP[i+1];
    if(score>=a.s && score<=b.s){
      const t=(score-a.s)/(b.s-a.s);
      return a.p+(b.p-a.p)*t;
    }
  }
  return 99.5;
}

// ═══════════════════════════════════════════════════════════════
// COMPUTED FINANCIALS + SCORE
// ═══════════════════════════════════════════════════════════════
function computeFinancials(a){
  const videoEarn   = (a.videoRate||0)*(a.videoQty||0);
  const thumbEarn   = (a.thumbRate||0)*(a.thumbQty||0);
  const consultEarn = (a.consultRate||0)*(a.consultDays||0);
  const monthlyIncome = (a.mainJobMonthly||0) + videoEarn + thumbEarn + consultEarn + (a.otherInc||0);

  const fixedExp = (a.rent||0)+(a.food||0)+(a.internet||0)+(a.electricity||0)+(a.phone||0)+(a.software||0)+(a.travel||0);
  const customExp = (a.customExpenses||[]).reduce((s,x)=>s+(x.amount||0),0);
  const monthlyExpense = fixedExp + customExp + (a.hasLoan?(a.emi||0):0);

  const monthlyInvest = (a.sip||0)+(a.stocks||0)+(a.otherInv||0);

  const monthlyProfit = monthlyIncome - monthlyExpense - monthlyInvest;
  const yearlyIncome = monthlyIncome*12;
  const yearlyExpense = monthlyExpense*12;
  const yearlyProfit = monthlyProfit*12;
  const yearlyInvest = monthlyInvest*12;

  return {monthlyIncome,monthlyExpense,monthlyInvest,monthlyProfit,yearlyIncome,yearlyExpense,yearlyProfit,yearlyInvest,videoEarn,thumbEarn,consultEarn,fixedExp,customExp};
}

function computeScore(a){
  const f = computeFinancials(a);
  // 1. Profit margin (25)
  const margin = f.monthlyIncome>0 ? (f.monthlyIncome-f.monthlyExpense)/f.monthlyIncome : -1;
  const profitScore = clamp(margin/0.40, 0, 1) * 25;

  // 2. Savings rate (20)
  const savingsRate = f.monthlyIncome>0 ? f.monthlyInvest/f.monthlyIncome : 0;
  const savingsScore = clamp(savingsRate/0.20, 0, 1) * 20;

  // 3. Emergency fund (20) — 6 months of expenses = full
  const efTarget = f.monthlyExpense*6;
  const efScore = efTarget>0 ? clamp((a.emergencyFund||0)/efTarget, 0, 1)*20 : (a.emergencyFund>0?20:10);

  // 4. Debt health (15) — no EMI=15, 50%+ of income on EMI=0
  const emi = a.hasLoan ? (a.emi||0) : 0;
  const emiRatio = f.monthlyIncome>0 ? emi/f.monthlyIncome : 0;
  const debtScore = clamp(1 - emiRatio/0.50, 0, 1) * 15;

  // 5. Goal progress (10)
  const goalScore = (a.targetIncome>0) ? clamp(f.monthlyIncome/a.targetIncome, 0, 1)*10 : 5;

  // 6. Income diversity (10)
  let streams = 0;
  if(a.mainJobMonthly>0) streams++;
  if(a.videoRate*a.videoQty>0) streams++;
  if(a.thumbRate*a.thumbQty>0) streams++;
  if(a.consultRate*a.consultDays>0) streams++;
  if(a.otherInc>0) streams++;
  const divScore = streams>=4?10 : streams===3?8 : streams===2?5 : streams===1?2 : 0;

  const total = profitScore+savingsScore+efScore+debtScore+goalScore+divScore;
  const score = Math.round(total);
  const stage = getStage(score);

  return {
    score, stage,
    breakdown: [
      {key:'Profit Margin',  val:profitScore,  max:25, pct: profitScore/25*100},
      {key:'Savings Rate',   val:savingsScore, max:20, pct: savingsScore/20*100},
      {key:'Emergency Fund', val:efScore,      max:20, pct: efScore/20*100},
      {key:'Debt Health',    val:debtScore,    max:15, pct: debtScore/15*100},
      {key:'Goal Progress',  val:goalScore,    max:10, pct: goalScore/10*100},
      {key:'Income Diversity',val:divScore,    max:10, pct: divScore/10*100}
    ],
    financials: f
  };
}

  }

  // Crushing it
  if(scoreData.score>=80 && f.monthlyProfit>30000){
    recs.push({ico:'🚀',txt:`<strong>You're crushing it.</strong> Diversify investments: 50% equity (Nifty/Mid-cap), 20% debt fund, 15% international (S&P500), 10% gold, 5% crypto. Increase SIP by 10% every 6 months.`});

  if(scoreData.score>=85){
    recs.push({ico:'🏆',txt:`<strong>Top tier — now scale.</strong> Hire a junior editor for grunt work (₹15k–25k/mo). You focus on client acquisition + creative direction. Doubles output, frees 20 hrs/week for higher-value work.`});
  }

  const customTotal = (a.customExpenses||[]).reduce((s,c)=>s+(c.amount||0),0);
  if(customTotal > f.monthlyExpense*0.20){

}

// ═══════════════════════════════════════════════════════════════
// FUTURE PROJECTION (compound growth math)
// ═══════════════════════════════════════════════════════════════
function computeProjection(a, sd, years){
  const f = sd.financials;
  const months = Math.max(1, years*12);
  const cumIncome = f.monthlyIncome * months;
  const cumExpenses = f.monthlyExpense * months;
  // SIP future value (12% p.a. = 1% monthly compounding)
  const r = 0.12 / 12;
  const sipFV = f.monthlyInvest > 0
    ? f.monthlyInvest * ((Math.pow(1+r, months) - 1) / r) * (1+r)
    : 0;
  // Cash savings (profit after investment), no growth — sitting in bank
  const cashSavings = Math.max(0, f.monthlyProfit - f.monthlyInvest) * months;
  // Emergency fund grows at 6% in liquid fund
  const efGrown = (a.emergencyFund||0) * Math.pow(1.06, years);
  const netWealth = sipFV + cashSavings + efGrown;
  return { years, months, cumIncome, cumExpenses, sipFV, cashSavings, efGrown, netWealth };
}

function projectionByYear(a, sd, maxYears){
  const points = [];
  for(let y=1; y<=maxYears; y++){
    const p = computeProjection(a, sd, y);
    points.push({ year: y, wealth: p.netWealth, income: p.cumIncome, invested: p.sipFV });
  }
  return points;
}

// ═══════════════════════════════════════════════════════════════
// FINAL REPORT (positives / negatives / focus)
// ═══════════════════════════════════════════════════════════════
function generateFinalReport(a, sd){
  const f = sd.financials;
  const positives = [];
  const negatives = [];
  const focus = [];

  // From score breakdown
  sd.breakdown.forEach(b => {
    const label = b.key;
    if(b.pct >= 80) positives.push(`${label} is strong (${b.val.toFixed(0)}/${b.max}).`);
    else if(b.pct < 40) negatives.push(`${label} is weak (${b.val.toFixed(0)}/${b.max}).`);
  });

  // Custom positives
  if(f.monthlyProfit>0) positives.push(`You operate at a profit of ${fmtRs(f.monthlyProfit)}/month.`);
  if(f.monthlyIncome>=50000) positives.push(`Your income (${fmtRs(f.monthlyIncome)}) is above the median Indian video editor (₹35,000).`);
  let streams = 0;
  if(a.mainJobMonthly>0)streams++; if(a.videoRate*a.videoQty>0)streams++; if(a.thumbRate*a.thumbQty>0)streams++; if(a.consultRate*a.consultDays>0)streams++; if(a.otherInc>0)streams++;
  if(streams>=3) positives.push(`${streams} active income streams — good diversification.`);
  if(f.monthlyInvest>0) positives.push(`You're investing ${fmtRs(f.monthlyInvest)}/month — most freelancers don't.`);

  // Custom negatives
  if(f.monthlyProfit<0) negatives.push(`You're losing ${fmtRs(-f.monthlyProfit)}/month — unsustainable.`);
  if(a.emergencyFund < f.monthlyExpense*3 && f.monthlyExpense>0) negatives.push(`Emergency fund only covers ${(a.emergencyFund/f.monthlyExpense).toFixed(1)} months — vulnerable to any income shock.`);
  if(a.hasLoan && a.emi/Math.max(f.monthlyIncome,1)>0.30) negatives.push(`EMI is ${Math.round(a.emi/f.monthlyIncome*100)}% of income — heavy debt burden.`);
  if(streams<=1) negatives.push(`Only ${streams} income source — single point of failure.`);
  if(f.monthlyInvest/Math.max(f.monthlyIncome,1)<0.10 && f.monthlyIncome>20000) negatives.push(`Saving only ${(f.monthlyInvest/Math.max(f.monthlyIncome,1)*100).toFixed(0)}% — far below 20-30% target.`);

  // Focus priorities (top 3 actions, ordered by weakness)
  const sorted = sd.breakdown.slice().sort((x,y)=>x.pct-y.pct);
  sorted.slice(0,3).forEach(b=>{
    if(b.pct >= 80) return; // skip already strong
    const map = {
      'Profit Margin':    `Increase prices by 15-20% on next 3 clients OR cut your biggest expense by ${fmtRs(Math.round(f.monthlyExpense*0.15))}.`,
      'Savings Rate':     `Set up SIP of ${fmtRs(Math.round(f.monthlyIncome*0.20))}/month — auto-debit on salary day.`,
      'Emergency Fund':   `Build to ${fmtRs(f.monthlyExpense*6)} (6 months expenses). Park ${fmtRs(Math.max(5000,(f.monthlyExpense*6-a.emergencyFund)/12))}/mo in a liquid fund.`,
      'Debt Health':      `Refinance EMI for lower rate OR aggressively prepay using bonuses + tax refunds.`,
      'Goal Progress':    `Add ${fmtRs(Math.max(0,a.targetIncome-f.monthlyIncome))}/mo through one new income stream or rate hike.`,
      'Income Diversity': `Add a 2nd skill — thumbnails, motion graphics, or consulting. Aim for 30% of income from it in 90 days.`
    };
    if(map[b.key]) focus.push(map[b.key]);
  });
  if(focus.length===0) focus.push('Document your system — pricing, SOPs, client onboarding. Build your moat.');

  // Verdict
  let verdict;
  const k = sd.stage.key;
  if(k==='Elite' || k==='Thriving') verdict = `🏆 Strong financial position. Focus on scaling and protecting wealth — not earning more.`;
  else if(k==='Growing' || k==='Stable') verdict = `📈 You're on track but vulnerable. The next 6 months should focus on fixing the weakest area before chasing more income.`;
  else if(k==='AtRisk') verdict = `⚠️ Warning signs present. Take corrective action this week — small changes now prevent big problems in 12 months.`;
  else verdict = `🚨 Critical state. Don't panic — but treat the next 30 days as a financial emergency. Cut, raise, save aggressively.`;

  return { positives: positives.slice(0,5), negatives: negatives.slice(0,5), focus, verdict };
}

function numControl({key, label, min=0, max=100000, step=100, value=0, prefix='₹', suffix=''}){
  const pct = max>min ? ((value-min)/(max-min))*100 : 0;
  return `
<div class="num-ctrl" data-num-key="${key}">
  <div class="num-top">
    <div class="num-lbl">${label}</div>
    <div class="num-row">
      ${prefix?`<span class="num-prefix">${prefix}</span>`:''}
      <input type="text" class="num-display" value="${value}" data-num-input="${key}" data-num-min="${min}" data-num-max="${max*5}" inputmode="numeric" readonly/>
      ${suffix?`<span class="num-prefix">${suffix}</span>`:''}
    </div>
  </div>
  <div class="range-wrap">
    <input type="range" min="${min}" max="${max}" step="${step}" value="${value}" data-num-range="${key}" style="--p:${pct}%"/>
  </div>
  <div class="range-marks"><span>${prefix||''}${min}</span><span>${prefix||''}${fmtN(max)}${suffix?' '+suffix:''}</span></div>
</div>`;
}

function render(){
  const step = AppState.step;
  document.getElementById('step-counter').textContent = step===Q.RESULT ? 'Result' : `Step ${step+1} of ${TOTAL_STEPS-1}`;
  const pct = step===Q.RESULT ? 100 : ((step+1)/(TOTAL_STEPS-1))*100;
  document.getElementById('progress-fill').style.width = pct+'%';
  const main = document.getElementById('main');
  // theme per step
  if(step===Q.INCOME) main.dataset.theme='income';
  else if(step===Q.EXPENSE) main.dataset.theme='expense';
  else delete main.dataset.theme;
  main.innerHTML = STEP_RENDERERS[step]();
  renderStepNav();
  window.scrollTo(0,0);
  AppState.save();
}

function renderStepNav(){
  const step = AppState.step;
  const inner = document.getElementById('step-nav-inner');
  if(step===Q.WELCOME){
    inner.innerHTML = AppState.user
      ? `<button class="btn btn-primary btn-full btn-lg" id="btn-next">Get started →</button>`
      : `<div style="text-align:center;width:100%;font-size:12px;color:var(--text3)">↑ Sign in with Google to continue</div>`;
  } else if(step===Q.RESULT){
    inner.innerHTML = `<button class="btn btn-secondary btn-full" id="btn-back">← Back to edit</button>`;
  } else {
    inner.innerHTML = `
      <button class="btn btn-secondary" id="btn-back" style="flex:0 0 100px">← Back</button>
      <button class="btn btn-primary" id="btn-next" style="flex:1">${step===Q.GOAL?'See my score →':'Continue →'}</button>`;
  }
}

// ═══════════════════════════════════════════════════════════════
// VALIDATION
// ═══════════════════════════════════════════════════════════════
function canAdvance(){
  const step = AppState.step;
  const a = AppState.answers;
  if(step===Q.WELCOME) return !!AppState.user;
  if(step===Q.PHONE) return /^\d{7,15}$/.test((a.whatsapp||'').replace(/\D/g,''));
  if(step===Q.ABOUT) return (a.name||'').trim().length>0;
  return true;
}

// ═══════════════════════════════════════════════════════════════
// EVENT DELEGATION
// ═══════════════════════════════════════════════════════════════
function setupEvents(){
  document.addEventListener('input', e=>{
    const t = e.target;

    // num-control RANGE slider
    if(t.dataset.numRange){
      const k = t.dataset.numRange;
      AppState.answers[k] = +t.value;
      // sync number input
      const ctrl = t.closest('.num-ctrl');
      const numIn = ctrl.querySelector('[data-num-input]');
      if(numIn) numIn.value = t.value;
      // gradient
      const min=+t.min, max=+t.max;
      const p = max>min?((+t.value-min)/(max-min))*100:0;
      t.style.setProperty('--p', p+'%');
      // result live update
      if(AppState.step===Q.RESULT) liveUpdateResult();
      AppState.save();
      return;
    }

    // num-control NUMBER input
    if(t.dataset.numInput){
      const k = t.dataset.numInput;
      // strip non-digits, allow decimal
      const cleaned = String(t.value).replace(/[^\d.]/g,'');
      if(cleaned !== t.value) t.value = cleaned;
      const v = parseFloat(cleaned)||0;
      AppState.answers[k] = v;
      // sync slider (clamp visually)
      const ctrl = t.closest('.num-ctrl');
      const range = ctrl.querySelector('[data-num-range]');
      if(range){
        const min=+range.min, max=+range.max;
        const clamped = Math.min(max, Math.max(min, v));
        range.value = clamped;
        const p = max>min?((clamped-min)/(max-min))*100:0;
        range.style.setProperty('--p', p+'%');
      }
      if(AppState.step===Q.RESULT) liveUpdateResult();
      AppState.save();
      return;
    }

    // simple inputs
    if(t.dataset.input){
      AppState.answers[t.dataset.input] = t.type==='number' ? (parseFloat(t.value)||0) : t.value;
      AppState.save();
      return;
    }

    // custom expense name
    if(t.dataset.cname){
      const c = AppState.answers.customExpenses.find(x=>x.id===t.dataset.cname);
      if(c) c.name = t.value;
      AppState.save();
      return;
    }
    if(t.dataset.camount){
      const c = AppState.answers.customExpenses.find(x=>x.id===t.dataset.camount);
      if(c) c.amount = parseFloat(t.value)||0;
      AppState.save();
      return;
    }
  });

  // tap-to-edit: remove readonly only when user explicitly taps the number
  document.addEventListener('pointerdown', e=>{
    const t = e.target;
    if(t.classList && t.classList.contains('num-display') && t.hasAttribute('readonly')){
      t.removeAttribute('readonly');
      requestAnimationFrame(()=>{ try{ t.focus(); t.select(); }catch{} });
    }
  });
  // re-arm readonly on blur (prevents accidental scroll-focus)
  document.addEventListener('blur', e=>{
    if(e.target.classList && e.target.classList.contains('num-display')){
      e.target.setAttribute('readonly','');
    }
  }, true);

  document.addEventListener('click', e=>{
    const t = e.target;

    // option cards
    const opt = t.closest('[data-opt]');
    if(opt){
      const group = opt.dataset.opt;
      const val = opt.dataset.val;
      if(group==='hasLoan'){
        AppState.answers.hasLoan = val==='true';
        document.getElementById('loan-fields').style.display = AppState.answers.hasLoan?'block':'none';
      } else {
        AppState.answers[group] = val;
      }
      document.querySelectorAll(`[data-opt="${group}"]`).forEach(x=>x.classList.remove('sel'));
      opt.classList.add('sel');
      AppState.save();
      return;
    }

    // chips
    const chip = t.closest('.chip');
    if(chip){ chip.classList.toggle('sel'); return; }

    // back/next
    if(t.id==='btn-back'){
      if(AppState.step>0){ AppState.step--; render(); }
      return;
    }
    if(t.id==='btn-next'){
      if(!canAdvance()){
        if(AppState.step===Q.PHONE) toast('Enter a valid WhatsApp number');
        else if(AppState.step===Q.ABOUT) toast('Please enter your name');
        else toast('Complete this step to continue');
        return;
      }
      AppState.step++;
      if(AppState.step>=TOTAL_STEPS) AppState.step=TOTAL_STEPS-1;
      render();
      return;
    }

    // signout
    if(t.id==='btn-signout'){
      AppState.user=null; AppState.save(); render(); return;
    }

    // add custom expense
    if(t.id==='btn-add-custom'){
      AppState.answers.customExpenses.push({id:uid(),name:'',amount:0});
      AppState.save();
      document.getElementById('custom-rows').innerHTML = renderCustomRows();
      return;
    }
    // delete custom
    if(t.dataset.cdel){
      AppState.answers.customExpenses = AppState.answers.customExpenses.filter(c=>c.id!==t.dataset.cdel);
      AppState.save();
      document.getElementById('custom-rows').innerHTML = renderCustomRows();
      return;
    }

    // result actions
    if(t.id==='btn-pdf'){ downloadPDF(); return; }
    if(t.id==='btn-wa'){ shareWhatsApp(); return; }
    if(t.id==='btn-restart'){
      if(confirm('Start over? Your current answers will be cleared.')) AppState.reset();
      return;
    }
  });
}

// ═══════════════════════════════════════════════════════════════
// LIVE RESULT UPDATE (when sliders change on result screen)
// ═══════════════════════════════════════════════════════════════
let liveTimer;
function liveUpdateResult(){
  clearTimeout(liveTimer);
  liveTimer = setTimeout(()=>{
    const sd = computeScore(AppState.answers);
    const C = 502.4;
    const offset = C - (C * sd.score/100);
    // ring
    const ring = document.querySelector('.score-ring-fg');
    if(ring) ring.setAttribute('stroke-dashoffset', offset);
    const num = document.querySelector('.score-num-big');
    if(num) num.textContent = sd.score;
    const tag = document.querySelector('.score-hero .stage-tag');
    if(tag){ tag.className = `stage-tag ${sd.stage.cls}`; tag.textContent = sd.stage.label; }
    const sub = document.querySelector('.score-stage-sub');
    if(sub) sub.textContent = sd.stage.desc;
    // bench
    const bench = benchmarkText(sd.stage, sd.score);
    const benchPct = document.querySelector('.bench-pct');
    const benchTxt = document.querySelector('.bench-txt');
    if(benchPct) benchPct.textContent = bench.match(/\d+(\.\d+)?%/)?.[0]||'';
    if(benchTxt) benchTxt.innerHTML = bench;
    // tables
    const f = sd.financials;
    const tbls = document.querySelectorAll('.tbl');
    if(tbls[0]){
      const rows = tbls[0].querySelectorAll('.tbl-row .v');
      rows[0].textContent = fmtRs(f.monthlyIncome);
      rows[1].textContent = fmtRs(f.monthlyExpense);
      rows[2].textContent = fmtRs(f.monthlyInvest);
      rows[3].textContent = fmtRs(f.monthlyProfit);
    }
    if(tbls[1]){
      const rows = tbls[1].querySelectorAll('.tbl-row .v');
      rows[0].textContent = fmtK(f.yearlyIncome);
      rows[1].textContent = fmtK(f.yearlyExpense);
      rows[2].textContent = fmtK(f.yearlyInvest);
      rows[3].textContent = fmtK(f.yearlyProfit);
    }
    // breakdown bars
    const bdRows = document.querySelectorAll('.bd-row');
    sd.breakdown.forEach((b,i)=>{
      const r = bdRows[i]; if(!r) return;
      r.querySelector('.bd-val').textContent = `${b.val.toFixed(0)} / ${b.max}`;
      r.querySelector('.bd-fill').style.width = b.pct+'%';
    });
    // chart
    if(resultCharts.bar){
      resultCharts.bar.data.datasets[0].data = [f.monthlyIncome,f.yearlyIncome];
      resultCharts.bar.data.datasets[1].data = [f.monthlyExpense,f.yearlyExpense];
      resultCharts.bar.data.datasets[2].data = [f.monthlyInvest,f.yearlyInvest];
      resultCharts.bar.update('none');
    }
    // projection
    const a = AppState.answers;
    const projY = a.projectionYears || 10;
    const proj = computeProjection(a, sd, projY);
    const yEl = document.getElementById('proj-years-num'); if(yEl) yEl.textContent = projY;
    const w = document.getElementById('proj-wealth'); if(w) w.textContent = fmtK(proj.netWealth);
    const inc = document.getElementById('proj-income'); if(inc) inc.textContent = fmtK(proj.cumIncome);
    const inv = document.getElementById('proj-invested'); if(inv) inv.textContent = fmtK(proj.sipFV);
    const exp = document.getElementById('proj-exp'); if(exp) exp.textContent = fmtK(proj.cumExpenses);
    if(resultCharts.proj){
      const pts = projectionByYear(a, sd, projY);
      resultCharts.proj.data.labels = pts.map(p=>p.year+'y');
      resultCharts.proj.data.datasets[0].data = pts.map(p=>p.wealth);
      resultCharts.proj.data.datasets[1].data = pts.map(p=>p.income);
      resultCharts.proj.update('none');
    }
  }, 60);
}

// PDF-safe Rs formatter (Helvetica core font can't render ₹)
const fmtPdfRs = n => 'Rs ' + Math.round(n||0).toLocaleString('en-IN');
const formatProjShort = n => { n=Math.round(n||0); if(n>=10000000) return 'Rs '+(n/10000000).toFixed(1).replace(/\.0$/,'')+'Cr'; if(n>=100000) return 'Rs '+(n/100000).toFixed(1).replace(/\.0$/,'')+'L'; if(n>=1000) return 'Rs '+(n/1000).toFixed(0)+'k'; return 'Rs '+n; };
const STAGE_NAME = {Elite:'ELITE',Thriving:'THRIVING',Growing:'GROWING',Stable:'STABLE',AtRisk:'AT RISK',Critical:'CRITICAL'};

function downloadPDF(returnBase64){
  try{
    if(!window.jspdf || !window.jspdf.jsPDF){
      if(!returnBase64) toast('⏳ PDF library loading, try again');
      return null;
    }
    if(!returnBase64) toast('📄 Generating PDF...');
    const a = AppState.answers;
    const sd = computeScore(a);
    const f = sd.financials;
    const pct = scoreToPercentile(sd.score);
    const N = Math.round(FREELANCER_POP_IN * pct/100);
    const stageRGB = {Elite:[168,85,247],Thriving:[34,197,94],Growing:[249,115,22],Stable:[59,130,246],AtRisk:[245,158,11],Critical:[239,68,68]}[sd.stage.key]||[249,115,22];
    const recs = recommendations(a, sd);

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({unit:'mm',format:'a4',orientation:'portrait'});
    const W = 210, H = 297, M = 12;
    let y = M;

    const tc = (...rgb)=>doc.setTextColor(...rgb);
    const fc = (...rgb)=>doc.setFillColor(...rgb);
    const dc = (...rgb)=>doc.setDrawColor(...rgb);
    const txt = (s,x,yy,opts)=>{
      if(s==null) return;
      // Pass arrays through as-is so jsPDF renders multi-line; only stringify scalars
      doc.text(Array.isArray(s) ? s : String(s), x, yy, opts||undefined);
    };
    const ck = needed => { if(y+needed > H-12){ doc.addPage(); y=M; } };

    // ─── HEADER ───
    doc.setFont('helvetica','bold'); doc.setFontSize(18); tc(17,17,17);
    txt('Ef', M, y+7);
    const efW = doc.getTextWidth('Ef ');
    tc(249,115,22); txt('Calculator', M+efW, y+7);
    doc.setFont('helvetica','normal'); doc.setFontSize(8); tc(102,102,102);
    txt('Financial Health Report  ·  ' + new Date().toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}), M, y+12);

    doc.setFont('helvetica','bold'); doc.setFontSize(11); tc(17,17,17);
    txt(a.name || AppState.user?.name || '—', W-M, y+6, {align:'right'});
    doc.setFont('helvetica','normal'); doc.setFontSize(8); tc(102,102,102);
    txt(AppState.user?.email||'', W-M, y+10, {align:'right'});
    txt((a.whatsappCC||'')+(a.whatsapp||''), W-M, y+14, {align:'right'});

    y += 17;
    dc(249,115,22); doc.setLineWidth(0.6); doc.line(M, y, W-M, y);
    y += 6;

    // ─── HERO SCORE CARD ───
    fc(255,248,241); dc(249,115,22); doc.setLineWidth(0.7);
    doc.roundedRect(M, y, W-2*M, 38, 4, 4, 'FD');

    const cx = M+22, cy = y+19, cr = 14;
    fc(255,255,255); doc.circle(cx, cy, cr, 'F');
    dc(...stageRGB); doc.setLineWidth(2.5); doc.circle(cx, cy, cr, 'S');
    doc.setFont('helvetica','bold'); doc.setFontSize(22); tc(17,17,17);
    txt(String(sd.score), cx, cy+2, {align:'center'});
    doc.setFontSize(7); tc(102,102,102);
    txt('/ 100', cx, cy+7, {align:'center'});

    // Stage badge
    doc.setFont('helvetica','bold'); doc.setFontSize(9);
    const stageTxt = STAGE_NAME[sd.stage.key] || 'STABLE';
    const stageW = doc.getTextWidth(stageTxt) + 6;
    fc(...stageRGB); doc.roundedRect(M+42, y+5, stageW, 6, 3, 3, 'F');
    tc(255,255,255); txt(stageTxt, M+45, y+9.2);

    tc(85,85,85); doc.setFont('helvetica','normal'); doc.setFontSize(10);
    txt(sd.stage.desc, M+42, y+17);

    doc.setFont('helvetica','bold'); doc.setFontSize(11); tc(249,115,22);
    txt(`Better than ${pct.toFixed(1)}%`, M+42, y+24);
    doc.setFont('helvetica','normal'); doc.setFontSize(9); tc(51,51,51);
    const benchLine = doc.splitTextToSize(`of Indian freelancers — ahead of ${fmtN(N)} people.`, W-M-M-42-3);
    txt(benchLine, M+42, y+29);

    y += 44;

    // ─── MONTHLY / YEARLY tables ───
    const colW = (W - 2*M - 6) / 2;
    const drawDataTable = (x, y0, title, rows) => {
      fc(17,17,17); doc.rect(x, y0, colW, 7, 'F');
      tc(255,255,255); doc.setFont('helvetica','bold'); doc.setFontSize(8);
      txt(title, x+3, y0+5);
      fc(249,249,249); dc(229,229,229); doc.setLineWidth(0.2);
      doc.rect(x, y0+7, colW, rows.length*6, 'FD');
      rows.forEach((r,i)=>{
        const ry = y0+7+(i+0.7)*6;
        doc.setFont('helvetica','normal'); doc.setFontSize(8); tc(102,102,102);
        txt(r[0], x+3, ry);
        doc.setFont('helvetica','bold'); tc(...r[2]);
        txt(r[1], x+colW-3, ry, {align:'right'});
      });
      return y0 + 7 + rows.length*6;
    };
    const G=[34,197,94], R=[239,68,68], O=[249,115,22];
    drawDataTable(M, y, 'MONTHLY', [
      ['Income', fmtPdfRs(f.monthlyIncome), G],
      ['Expenses', fmtPdfRs(f.monthlyExpense), R],
      ['Investments', fmtPdfRs(f.monthlyInvest), O],
      ['Net Profit', fmtPdfRs(f.monthlyProfit), f.monthlyProfit>=0?G:R]
    ]);
    drawDataTable(M+colW+6, y, 'YEARLY', [
      ['Income', fmtPdfRs(f.yearlyIncome), G],
      ['Expenses', fmtPdfRs(f.yearlyExpense), R],
      ['Investments', fmtPdfRs(f.yearlyInvest), O],
      ['Net Profit', fmtPdfRs(f.yearlyProfit), f.yearlyProfit>=0?G:R]
    ]);
    y += 7 + 4*6 + 6;

    // ─── INCOME / EXPENSE BREAKDOWN ───
    const incLines = [];
    if(a.mainJobMonthly) incLines.push(['Salary / Main Job', a.mainJobMonthly]);
    if(a.videoRate*a.videoQty) incLines.push(['Video Editing', a.videoRate*a.videoQty]);
    if(a.thumbRate*a.thumbQty) incLines.push(['Thumbnails', a.thumbRate*a.thumbQty]);
    if(a.consultRate*a.consultDays) incLines.push(['Consulting', a.consultRate*a.consultDays]);
    if(a.otherInc) incLines.push(['Other income', a.otherInc]);
    const expLines = [];
    if(a.rent) expLines.push(['Rent / Office', a.rent]);
    if(a.food) expLines.push(['Food', a.food]);
    if(a.internet) expLines.push(['Internet', a.internet]);
    if(a.electricity) expLines.push(['Electricity', a.electricity]);
    if(a.phone) expLines.push(['Phone', a.phone]);
    if(a.software) expLines.push(['Software / AI', a.software]);
    if(a.travel) expLines.push(['Travel', a.travel]);
    (a.customExpenses||[]).forEach(c=>{ if(c.amount>0) expLines.push([c.name||'Custom', c.amount]); });
    if(a.hasLoan && a.emi) expLines.push(['EMI', a.emi]);

    doc.setFont('helvetica','bold'); doc.setFontSize(8);
    tc(34,128,94); txt('INCOME BREAKDOWN', M, y);
    tc(185,28,28); txt('EXPENSE BREAKDOWN', M+colW+6, y);
    y += 2;

    const drawBd = (x, y0, rows, bg, brd, clr) => {
      if(rows.length===0){
        fc(249,249,249); dc(229,229,229); doc.setLineWidth(0.2);
        doc.rect(x, y0, colW, 8, 'FD');
        tc(150,150,150); doc.setFont('helvetica','italic'); doc.setFontSize(8);
        txt('No entries', x+3, y0+5);
        return y0+8;
      }
      const hh = rows.length*5.5;
      fc(...bg); dc(...brd); doc.setLineWidth(0.2);
      doc.rect(x, y0, colW, hh, 'FD');
      rows.forEach((r,i)=>{
        const ry = y0+(i+0.7)*5.5;
        doc.setFont('helvetica','normal'); doc.setFontSize(8); tc(102,102,102);
        txt(r[0], x+3, ry);
        doc.setFont('helvetica','bold'); tc(...clr);
        txt(fmtPdfRs(r[1]), x+colW-3, ry, {align:'right'});
      });
      return y0+hh;
    };
    const yi = drawBd(M, y, incLines, [240,253,244], [187,247,208], [21,128,61]);
    const ye = drawBd(M+colW+6, y, expLines, [254,242,242], [254,202,202], [185,28,28]);
    y = Math.max(yi, ye) + 6;

    // ─── SCORE BREAKDOWN bars ───
    ck(sd.breakdown.length*7 + 12);
    doc.setFont('helvetica','bold'); doc.setFontSize(8); tc(102,102,102);
    txt('SCORE BREAKDOWN', M, y);
    y += 2;
    const bdH = sd.breakdown.length*7 + 4;
    fc(249,249,249); dc(229,229,229); doc.setLineWidth(0.2);
    doc.rect(M, y, W-2*M, bdH, 'FD');
    y += 3;
    sd.breakdown.forEach(b=>{
      doc.setFont('helvetica','normal'); doc.setFontSize(8); tc(102,102,102);
      txt(b.key, M+3, y+3);
      doc.setFont('helvetica','bold'); tc(17,17,17);
      txt(`${b.val.toFixed(0)} / ${b.max}`, W-M-3, y+3, {align:'right'});
      fc(229,229,229); doc.rect(M+3, y+4, W-2*M-6, 1.5, 'F');
      fc(249,115,22); doc.rect(M+3, y+4, (W-2*M-6) * b.pct/100, 1.5, 'F');
      y += 7;
    });
    y += 4;

    // ─── 4 KEY STATS ───
    ck(22);
    const statW = (W-2*M-9)/4;
    const profitMarginPct = f.monthlyIncome>0?((f.monthlyIncome-f.monthlyExpense)/f.monthlyIncome*100).toFixed(0):0;
    const savingsRatePct  = f.monthlyIncome>0?(f.monthlyInvest/f.monthlyIncome*100).toFixed(0):0;
    const efMonths        = f.monthlyExpense>0?((a.emergencyFund||0)/f.monthlyExpense).toFixed(1):0;
    const goalPct         = a.targetIncome>0?Math.min(100,Math.round(f.monthlyIncome/a.targetIncome*100)):0;
    const stats = [
      ['PROFIT MARGIN', profitMarginPct+'%'],
      ['SAVINGS RATE',  savingsRatePct+'%'],
      ['EMERG. FUND',   efMonths+'x mo'],
      ['GOAL PROGRESS', goalPct+'%']
    ];
    stats.forEach((s,i)=>{
      const x = M + i*(statW+3);
      fc(249,249,249); dc(229,229,229); doc.setLineWidth(0.2);
      doc.rect(x, y, statW, 16, 'FD');
      doc.setFont('helvetica','bold'); doc.setFontSize(7); tc(102,102,102);
      txt(s[0], x+statW/2, y+5, {align:'center'});
      doc.setFontSize(14); tc(17,17,17);
      txt(s[1], x+statW/2, y+12, {align:'center'});
    });
    y += 21;

    // ─── FINAL VERDICT ───
    const fr = generateFinalReport(a, sd);
    ck(20);
    fc(255,248,241); dc(249,115,22); doc.setLineWidth(0.5);
    const verdictLines = doc.splitTextToSize(fr.verdict.replace(/[^\x00-\x7F]/g,'').trim(), W-2*M-6);
    const vh = verdictLines.length*4 + 6;
    doc.rect(M, y, W-2*M, vh, 'FD');
    doc.setFont('helvetica','bold'); doc.setFontSize(9); tc(249,115,22);
    txt(verdictLines, M+3, y+4);
    y += vh + 4;

    // ─── POSITIVES / NEGATIVES / FOCUS (3-column) ───
    const colWFR = (W - 2*M - 6) / 2;
    const drawFRBlock = (x, y0, title, items, color, bgRGB) => {
      const lines = [];
      items.forEach(it=>{
        const wraped = doc.splitTextToSize('• '+it, colWFR-6);
        wraped.forEach(l=>lines.push(l));
      });
      if(lines.length===0) lines.push('• None');
      const hh = lines.length*3.6 + 8;
      fc(...bgRGB); dc(229,229,229); doc.setLineWidth(0.2);
      doc.rect(x, y0, colWFR, hh, 'FD');
      doc.setFont('helvetica','bold'); doc.setFontSize(8); tc(...color);
      txt(title, x+3, y0+5);
      doc.setFont('helvetica','normal'); doc.setFontSize(7.5); tc(51,51,51);
      txt(lines, x+3, y0+9.5);
      return y0+hh;
    };
    ck(38);
    const cleanPos = fr.positives.map(s=>s.replace(/[^\x00-\x7F]/g,'').trim());
    const cleanNeg = fr.negatives.map(s=>s.replace(/[^\x00-\x7F]/g,'').trim());
    const cleanFoc = fr.focus.map(s=>s.replace(/[^\x00-\x7F]/g,'').replace(/Rs/g,'Rs').trim());
    const yP = drawFRBlock(M, y, 'WHATS WORKING', cleanPos, [21,128,61], [240,253,244]);
    const yN = drawFRBlock(M+colWFR+6, y, 'WHATS NOT', cleanNeg, [185,28,28], [254,242,242]);
    y = Math.max(yP, yN) + 4;

    // FOCUS — full-width single render
    const focLinesAll = [];
    cleanFoc.forEach(it=>{ doc.splitTextToSize('• '+it, W-2*M-6).forEach(l=>focLinesAll.push(l)); });
    const fh = focLinesAll.length*3.8 + 8;
    ck(fh + 4);
    fc(255,251,235); dc(249,115,22); doc.setLineWidth(0.3);
    doc.rect(M, y, W-2*M, fh, 'FD');
    doc.setFont('helvetica','bold'); doc.setFontSize(8); tc(249,115,22);
    txt('FOCUS THIS MONTH', M+3, y+5);
    doc.setFont('helvetica','normal'); doc.setFontSize(7.5); tc(51,51,51);
    txt(focLinesAll, M+3, y+9.5);
    y += fh + 6;

    // ─── WEALTH PROJECTION ───
    ck(28);
    doc.setFont('helvetica','bold'); doc.setFontSize(8); tc(102,102,102);
    txt('WEALTH PROJECTION  (assuming 12% returns on investments)', M, y);
    y += 3;
    const projYears = [5, 10, 20, 30, 40];
    const projColW = (W-2*M)/projYears.length;
    fc(17,17,17); doc.rect(M, y, W-2*M, 6, 'F');
    tc(255,255,255); doc.setFont('helvetica','bold'); doc.setFontSize(7);
    projYears.forEach((yr,i)=>txt('IN '+yr+' YEARS', M+i*projColW+projColW/2, y+4, {align:'center'}));
    y += 6;
    fc(249,249,249); dc(229,229,229); doc.setLineWidth(0.2);
    doc.rect(M, y, W-2*M, 22, 'FD');
    projYears.forEach((yr,i)=>{
      const p = computeProjection(a, sd, yr);
      const xC = M + i*projColW + projColW/2;
      doc.setFont('helvetica','bold'); doc.setFontSize(11); tc(249,115,22);
      txt(formatProjShort(p.netWealth), xC, y+8, {align:'center'});
      doc.setFont('helvetica','normal'); doc.setFontSize(7); tc(102,102,102);
      txt('Net Wealth', xC, y+13, {align:'center'});
      doc.setFontSize(7); tc(34,128,94);
      txt(formatProjShort(p.cumIncome)+' inc', xC, y+18, {align:'center'});
    });
    y += 26;

    // ─── RECOMMENDATIONS ───
    ck(15);
    doc.setFont('helvetica','bold'); doc.setFontSize(8); tc(102,102,102);
    txt('PERSONALIZED RECOMMENDATIONS', M, y);
    y += 3;
    recs.forEach(r=>{
      const clean = r.txt.replace(/<[^>]+>/g,'').replace(/₹/g,'Rs ').replace(/[^\x00-\x7F]/g,'').trim();
      const lines = doc.splitTextToSize(clean, W-2*M-8);
      const hh = lines.length*4 + 4;
      ck(hh+2);
      fc(255,251,235); doc.rect(M, y, W-2*M, hh, 'F');
      fc(249,115,22); doc.rect(M, y, 1, hh, 'F');
      doc.setFont('helvetica','normal'); doc.setFontSize(8); tc(51,51,51);
      txt(lines, M+4, y+4);
      y += hh + 2;
    });

    // ─── FOOTER ───
    y = Math.max(y, H - 14);
    dc(229,229,229); doc.setLineWidth(0.2);
    doc.line(M, y, W-M, y);
    doc.setFont('helvetica','normal'); doc.setFontSize(7); tc(150,150,150);
    txt('Generated by Ef Calculator  ·  calculator.youreditorfriend.in', M, y+4);
    txt(`Age ${a.age}  ·  ${a.experience}y exp  ·  ${a.employment}`, W-M, y+4, {align:'right'});

    const filename = `EfCalculator_${(a.name||'Report').replace(/[^\w]/g,'_')}_${new Date().toISOString().slice(0,10)}.pdf`;
    if(returnBase64){
      const dataUri = doc.output('datauristring');
      return { base64: dataUri.split(',')[1], filename };
    }
    doc.save(filename);
    toast('✅ PDF downloaded');
    return { filename };
  } catch(err){
    console.error('PDF error:', err);
    if(!returnBase64) toast('❌ PDF failed: '+(err.message||err));
    return null;
  }
}

// ═══════════════════════════════════════════════════════════════
// SUBMIT TO GOOGLE SHEET
// ═══════════════════════════════════════════════════════════════
function setSaveStatus(state, msg){
  const el = document.getElementById('save-status');
  if(!el) return;
  el.className = 'save-status ' + (state||'');
  const t = el.querySelector('.save-status-txt');
  if(t) t.textContent = msg;
}

async function submitToSheet(silent){
  if(!APPS_SCRIPT_URL || APPS_SCRIPT_URL.startsWith('YOUR_')){
    if(!silent) toast('⚠️ Apps Script URL not configured yet');
    setSaveStatus('err','⚠️ Save endpoint not configured');
    return;
  }
  setSaveStatus('','Saving your report...');
  const a = AppState.answers;
  const sd = computeScore(a);
  const payload = {
    email: AppState.user?.email||'',
    name:  a.name||AppState.user?.name||'',
    whatsapp: (a.whatsappCC||'')+(a.whatsapp||''),
    age: a.age, experience: a.experience, employment: a.employment,
    monthlyIncome: sd.financials.monthlyIncome,
    monthlyExpense: sd.financials.monthlyExpense,
    monthlyInvest: sd.financials.monthlyInvest,
    monthlyProfit: sd.financials.monthlyProfit,
    emi: a.hasLoan?a.emi:0,
    investments: sd.financials.monthlyInvest,
    emergencyFund: a.emergencyFund,
    targetIncome: a.targetIncome,
    score: sd.score,
    stage: sd.stage.key,
    percentile: scoreToPercentile(sd.score),
    customExpenses: a.customExpenses
  };
  try{
    await fetch(APPS_SCRIPT_URL, {method:'POST',mode:'no-cors',body:JSON.stringify(payload)});
    const t = new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
    setSaveStatus('ok','✅ Saved automatically at '+t);
    if(!silent) toast('✅ Saved successfully');
  }catch(err){
    setSaveStatus('err','❌ Save failed — refresh to retry');
    if(!silent) toast('❌ Save failed — try again');
  }
}

async function shareWhatsApp(){
  if(!APPS_SCRIPT_URL || APPS_SCRIPT_URL.startsWith('YOUR_')){
    toast('⚠️ Backend not configured');
    return;
  }
  const a = AppState.answers;
  if(!a.whatsapp || a.whatsapp.replace(/\D/g,'').length < 7){
    toast('⚠️ Add a valid WhatsApp number first');
    return;
  }
  toast('📤 Generating + sending report...');
  try{
    const sd = computeScore(a);
    const pdfRes = downloadPDF(true);
    if(!pdfRes || !pdfRes.base64){
      toast('❌ PDF generation failed');
      return;
    }
    const payload = {
      action: 'sendWhatsapp',
      email: AppState.user?.email||'',
      name: a.name||AppState.user?.name||'',
      whatsapp: (a.whatsappCC||'')+(a.whatsapp||''),
      age: a.age, experience: a.experience, employment: a.employment,
      monthlyIncome: sd.financials.monthlyIncome,
      monthlyExpense: sd.financials.monthlyExpense,
      monthlyInvest: sd.financials.monthlyInvest,
      monthlyProfit: sd.financials.monthlyProfit,
      emi: a.hasLoan?a.emi:0,
      emergencyFund: a.emergencyFund,
      targetIncome: a.targetIncome,
      score: sd.score,
      stage: sd.stage.key,
      stageLabel: sd.stage.label,
      percentile: scoreToPercentile(sd.score),
      customExpenses: a.customExpenses,
      pdfBase64: pdfRes.base64,
      pdfFilename: pdfRes.filename
    };
    await fetch(APPS_SCRIPT_URL, {method:'POST',mode:'no-cors',body:JSON.stringify(payload)});
    toast('✅ Sent! Check your WhatsApp in 30 sec');
  }catch(err){
    console.error('WA send error:', err);
    toast('❌ Failed: '+(err.message||err));
  }
}

// ═══════════════════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════════════════
let toastT;
function toast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastT);
  toastT = setTimeout(()=>el.classList.remove('show'), 2400);
}

// ═══════════════════════════════════════════════════════════════
// GOOGLE SIGN-IN CALLBACK (must be window-scoped)
// ═══════════════════════════════════════════════════════════════
window.handleCredentialResponse = function(response){
  try{
    const jwt = response.credential;
    const payload = JSON.parse(atob(jwt.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));
    AppState.user = {
      email: payload.email, name: payload.name, picture: payload.picture, sub: payload.sub
    };
    if(!AppState.answers.name) AppState.answers.name = payload.given_name||payload.name||'';
    AppState.save();
    toast('Signed in — let\'s go');
    render();
  }catch(e){ toast('Sign-in failed'); }
};

// ═══════════════════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════════════════
function boot(){
  AppState.load();
  setupEvents();
  render();
}
boot();
